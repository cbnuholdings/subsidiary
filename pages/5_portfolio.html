<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📊 포트폴리오 관리 · 자회사 설립 통합관리</title>
<link rel="stylesheet" href="../common/style.css">
<style>
  :root{ --brand:#b01c50; --brand-d:#8a163f; --ok:#1f8a4c; --warn:#c47f0a; --bad:#c0392b; }
  body{ font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif; background:#f5f1f0; margin:0; color:#222; }
  .wrap{ max-width:1000px; margin:0 auto; padding:18px 16px 70px; }
  .card{ background:#fff; border:1px solid #e7dfe1; border-radius:14px; padding:20px 22px; margin-top:14px; }
  .card h2{ margin:0 0 12px; font-size:16px; color:var(--brand-d); border-bottom:2px solid #f0e6e9; padding-bottom:9px; }
  .card h3{ font-size:13px; color:var(--brand-d); margin:16px 0 6px; }
  label{ display:block; font-size:12px; color:#555; margin:8px 0 4px; }
  input,select{ width:100%; box-sizing:border-box; padding:8px 9px; border:1px solid #ccc; border-radius:7px; font-size:13px; }
  .row{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; } @media(max-width:760px){ .row{ grid-template-columns:1fr 1fr; } }
  table.grid{ width:100%; border-collapse:collapse; font-size:12.5px; margin-top:8px; }
  table.grid th,table.grid td{ border:1px solid #ecdfe3; padding:6px 8px; text-align:right; }
  table.grid th{ background:#fbf1f4; color:var(--brand-d); text-align:center; }
  table.grid td.l{ text-align:left; }
  button{ background:var(--brand); color:#fff; border:0; border-radius:9px; padding:10px 16px; font-size:13px; cursor:pointer; margin-top:12px; }
  button:hover{ background:var(--brand-d); } button.mini{ padding:5px 10px; font-size:12px; background:#fff; color:var(--brand-d); border:1px solid #d9c2c9; margin:0; }
  .kpi3{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .kpi{ background:#fbf5f7; border:1px solid #f0e0e6; border-radius:10px; padding:14px; text-align:center; }
  .kpi b{ display:block; font-size:19px; color:var(--brand); } .kpi span{ font-size:11px; color:#888; }
  .miss{ display:inline-block; font-size:11px; padding:3px 9px; border-radius:20px; background:#fdf2e0; color:var(--warn); margin:2px; }
  .badge{ display:inline-block; font-size:12px; font-weight:700; padding:3px 11px; border-radius:20px; }
  .b-ok{ background:#e3f5ea; color:var(--ok); } .b-bad{ background:#fbe7e4; color:var(--bad); }
  .muted{ color:#999; font-size:12px; } .empty{ text-align:center; color:#aa9; padding:40px; }
  .stub{ background:#fbf7ee; border:1px dashed #e3cf9e; border-radius:9px; padding:10px 12px; font-size:12px; color:#7a5908; margin-top:8px; }
</style>
</head>
<body>
<div id="appHeader"></div>
<div class="wrap">
  <div class="card" id="picker">
    <h2>📊 자회사 포트폴리오 관리</h2>
    <div class="muted">설립 완료 자회사의 분기 회계보고·연간 가결산 자산평가(취득원가+순자산가치 병기·손상검토)를 관리합니다.</div>
    <label>대상 자회사 선택</label><select id="coSel"></select>
    <div class="stub">🔗 P2 연계 — 기존 thevc식 투자기업 관리 Notion DB(기업마스터·재무·투자유치 등)와 cid로 연결해 재무 레코드를 공유합니다.</div>
  </div>

  <div id="body" style="display:none">
    <div class="card">
      <h2 id="coTitle"></h2>
      <div class="kpi3">
        <div class="kpi"><b id="k_cost">-</b><span>취득원가(출자금)</span></div>
        <div class="kpi"><b id="k_pct">-</b><span>지주 지분율</span></div>
        <div class="kpi"><b id="k_carry">-</b><span>평가 장부가(보수)</span></div>
      </div>
    </div>

    <div class="card">
      <h2>분기 회계보고</h2>
      <div class="row">
        <div><label>연도</label><input id="r_year" type="number"></div>
        <div><label>분기</label><select id="r_q"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
        <div><label>매출(원)</label><input id="r_rev" type="number"></div>
        <div><label>영업이익(원)</label><input id="r_op" type="number"></div>
      </div>
      <div class="row">
        <div><label>당기순이익(원)</label><input id="r_net" type="number"></div>
        <div><label>자산총계(원)</label><input id="r_asset" type="number"></div>
        <div><label>부채총계(원)</label><input id="r_liab" type="number"></div>
        <div><label>자본총계(원)</label><input id="r_equity" type="number"></div>
      </div>
      <button onclick="addReport()">분기보고 등록</button>
      <span class="muted" id="repMsg"></span>
      <h3>제출 현황 / 미제출 요청</h3>
      <div id="missBox"></div>
      <table class="grid" id="repTbl"></table>
    </div>

    <div class="card">
      <h2>연간 가결산 — 자산평가</h2>
      <table class="grid" id="valTbl"></table>
      <div class="muted" style="margin-top:8px">※ 순자산가치 = 최신 자본총계 × 지분율. 순자산이 취득원가 미만이면 손상으로 보아 장부가를 감액 표시합니다.</div>
    </div>
  </div>
</div>

<script src="../common/invest.js"></script>
<script src="../common/app.js"></script>
<script src="../common/brand.js"></script>
<script>
  if(typeof fetch!=='undefined'){ fetch('../common/config.json').then(r=>r.json()).then(c=>SUB.setConfig(c)).catch(()=>{}); }
  try{ BRAND.renderHeader('port'); }catch(e){}
  function won(n){ return Math.round(Number(n)||0).toLocaleString('ko-KR')+'원'; }

  function fillPicker(){
    var sel=document.getElementById('coSel');
    var cos=SUB.DB.companies.filter(function(c){ return ['설립','관리','심의가결'].indexOf(c.stage)>=0; });
    sel.innerHTML='<option value="">— 선택 —</option>'+cos.map(c=>'<option value="'+c.cid+'">'+SUB.esc(c.name)+' ('+c.cid+')</option>').join('');
    if(!cos.length) document.getElementById('picker').insertAdjacentHTML('beforeend','<div class="empty">설립 완료(또는 심의가결) 자회사가 없습니다.</div>');
    var cur=SUB.getCID(); if(cur && cos.some(c=>c.cid===cur)) sel.value=cur;
  }
  function port(cid){
    if(!SUB.DB.portfolio[cid]){
      var inv=SUB.DB.invest[cid]||{};
      SUB.DB.portfolio[cid]={ cid:cid, cost:inv.investment||0, pct:inv.actualPct||inv.equityPct||0.10, reports:[], requests:[] };
    }
    return SUB.DB.portfolio[cid];
  }
  function loadCo(cid){
    if(!cid){ document.getElementById('body').style.display='none'; return; }
    SUB.setCID(cid);
    var co=SUB.DB.companies.find(c=>c.cid===cid)||{};
    document.getElementById('body').style.display='';
    document.getElementById('coTitle').textContent=(co.name||cid)+' — 포트폴리오';
    var p=port(cid);
    document.getElementById('k_cost').textContent=won(p.cost);
    document.getElementById('k_pct').textContent=(p.pct*100).toFixed(2)+'%';
    document.getElementById('r_year').value=new Date().getFullYear();
    render();
  }
  function latestEquity(p){
    var r=(p.reports||[]).slice().sort(function(a,b){ return (a.year-b.year)||(a.quarter-b.quarter); }).pop();
    return r?Number(r.equity)||0:0;
  }
  function render(){
    var cid=SUB.getCID(), p=port(cid);
    // 평가
    var equity=latestEquity(p);
    var ev=SUB.evalAsset(p.cost, equity, p.pct);
    document.getElementById('k_carry').textContent=won(ev.carrying);
    document.getElementById('valTbl').innerHTML=
      '<tr><th>구분</th><th>금액</th><th>비고</th></tr>'+
      '<tr><td class="l">취득원가(a)</td><td>'+won(ev.cost)+'</td><td class="l">출자금</td></tr>'+
      '<tr><td class="l">순자산가치(b)</td><td>'+won(ev.nav)+'</td><td class="l">최신 자본총계 '+won(equity)+' × '+(p.pct*100).toFixed(2)+'%</td></tr>'+
      '<tr><td class="l">평가 장부가</td><td>'+won(ev.carrying)+'</td><td class="l">'+(ev.impaired?'<span class="badge b-bad">손상 — b로 감액</span>':'<span class="badge b-ok">취득원가 유지</span>')+'</td></tr>';
    // 분기 현황
    var yr=+document.getElementById('r_year').value||new Date().getFullYear();
    var miss=SUB.missingQuarters(p.reports, yr);
    document.getElementById('missBox').innerHTML= yr+'년 미제출: '+
      (miss.length? miss.map(q=>'<span class="miss">'+q+'분기</span>').join('')+' <button class="mini" onclick="requestQuarter('+yr+')">📧 미제출 자료 요청</button>'
        : '<span class="badge b-ok">전 분기 제출 완료</span>');
    // 제출 테이블
    var rows=(p.reports||[]).slice().sort(function(a,b){ return (b.year-a.year)||(b.quarter-a.quarter); }).map(function(r){
      return '<tr><td class="l">'+r.year+' '+r.quarter+'Q</td><td>'+won(r.revenue)+'</td><td>'+won(r.opProfit)+'</td><td>'+won(r.netProfit)+
        '</td><td>'+won(r.equity)+'</td><td class="l">'+(r.submittedAt?r.submittedAt.slice(0,10):'')+'</td></tr>'; }).join('');
    document.getElementById('repTbl').innerHTML='<tr><th>기간</th><th>매출</th><th>영업이익</th><th>당기순이익</th><th>자본총계</th><th>제출일</th></tr>'+
      (rows||'<tr><td colspan="6" class="muted">제출된 보고 없음</td></tr>');
  }
  function addReport(){
    var cid=SUB.getCID(), p=port(cid);
    var rec={ year:+document.getElementById('r_year').value, quarter:+document.getElementById('r_q').value,
      revenue:+document.getElementById('r_rev').value||0, opProfit:+document.getElementById('r_op').value||0,
      netProfit:+document.getElementById('r_net').value||0, assets:+document.getElementById('r_asset').value||0,
      liabilities:+document.getElementById('r_liab').value||0, equity:+document.getElementById('r_equity').value||0,
      submittedAt:new Date().toISOString() };
    // 같은 연도·분기 덮어쓰기
    p.reports=(p.reports||[]).filter(function(r){ return !(r.year===rec.year && r.quarter===rec.quarter); });
    p.reports.push(rec);
    SUB.commit('portfolio', cid, p);   // 분기보고 포함 전체 레코드 서버 동기화
    SUB.upsertCompany({cid:cid, stage:'관리'});
    document.getElementById('repMsg').textContent=rec.year+' '+rec.quarter+'Q 등록됨 ✔';
    render();
  }
  function requestQuarter(yr){
    var cid=SUB.getCID(), p=port(cid);
    var miss=SUB.missingQuarters(p.reports, yr);
    p.requests=(p.requests||[]); miss.forEach(function(q){ p.requests.push({year:yr,quarter:q,requestedAt:new Date().toISOString()}); });
    SUB.commit('portfolio', cid, p);
    var ap=SUB.DB.applicants[cid]||{}; var email=ap.email||'';
    var subj=encodeURIComponent('['+yr+'] 자회사 분기 회계보고 자료 요청');
    var bodyq=encodeURIComponent('미제출 분기: '+miss.map(q=>q+'분기').join(', ')+'\n분기 재무자료(매출·영업이익·당기순이익·자본총계 등) 제출을 요청드립니다.');
    if(email) window.location.href='mailto:'+email+'?subject='+subj+'&body='+bodyq;
    else alert('미제출 자료 요청을 기록했습니다('+miss.join(', ')+'분기).');
  }
  document.getElementById('coSel').addEventListener('change', function(){ loadCo(this.value); });
  document.getElementById('r_year') && document.getElementById('coSel');

  fillPicker();
  if(SUB.getCID()) loadCo(SUB.getCID());
</script>
</body>
</html>
