<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>신청 조회 · 자회사 설립 통합관리</title>
<link rel="stylesheet" href="../common/style.css">
<style>
  :root{ --brand:#b01c50; --brand-d:#8a163f; --ok:#1f8a4c; --warn:#c47f0a; }
  body{ font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif; background:#f5f1f0; margin:0; color:#222; }
  .wrap{ max-width:560px; margin:0 auto; padding:30px 16px 70px; }
  .card{ background:#fff; border:1px solid #e7dfe1; border-radius:14px; padding:22px 24px; margin-top:14px; }
  h1{ font-size:18px; color:var(--brand-d); margin:0 0 4px; } .sub{ color:#888; font-size:13px; margin-bottom:14px; }
  label{ display:block; font-size:12px; color:#555; margin:10px 0 4px; }
  input{ width:100%; box-sizing:border-box; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:14px; }
  button{ width:100%; background:var(--brand); color:#fff; border:0; border-radius:9px; padding:12px; font-size:14px; cursor:pointer; margin-top:16px; }
  button:hover{ background:var(--brand-d); }
  .msg{ color:var(--warn); font-size:13px; margin-top:10px; min-height:18px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; margin-top:6px; }
  td{ border-bottom:1px solid #f0e6e9; padding:8px 6px; } td:first-child{ color:#888; width:38%; }
  .stage{ display:inline-block; font-weight:700; color:#fff; background:var(--brand); border-radius:20px; padding:3px 12px; font-size:12px; }
  .steps{ display:flex; gap:4px; margin:12px 0; flex-wrap:wrap; }
  .step{ flex:1; min-width:60px; text-align:center; font-size:11px; padding:6px 2px; border-radius:7px; background:#f0e6e9; color:#aa8; }
  .step.on{ background:var(--brand); color:#fff; }
  a.link{ color:var(--brand-d); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="loginCard">
    <h1>📄 신청 진행 상황 조회</h1>
    <div class="sub">접수번호와 신청 시 입력한 연락처 뒷 4자리로 조회합니다.</div>
    <label>접수번호</label><input id="appId" placeholder="예: P1_홍길동_001">
    <label>연락처 뒷 4자리</label><input id="last4" maxlength="4" inputmode="numeric" placeholder="0000">
    <button onclick="doLookup()">조회</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="card" id="statusCard" style="display:none">
    <h1>📋 <span id="coName"></span></h1>
    <div class="sub">접수번호 <b id="rId"></b></div>
    <div class="steps" id="steps"></div>
    <table id="info"></table>
    <div id="extra" style="margin-top:12px"></div>
    <button onclick="location.reload()" style="background:#fff;color:var(--brand-d);border:1px solid #d9c2c9">다른 건 조회</button>
  </div>
</div>

<script src="../common/app.js"></script>
<script>
  if(typeof fetch!=='undefined'){ fetch('../common/config.json').then(r=>r.json()).then(c=>SUB.setConfig(c)).catch(()=>{}); }
  var STAGES=['신청','LOI','출자','심의','심의가결','설립','관리'];
  function esc(s){ return SUB.esc(s); }

  function doLookup(){
    var appId=document.getElementById('appId').value.trim();
    var last4=document.getElementById('last4').value.trim();
    var msg=document.getElementById('msg');
    if(!appId||!last4){ msg.textContent='접수번호와 연락처 뒷 4자리를 입력하세요.'; return; }
    msg.textContent='조회 중…';
    SUB.applicantLogin(appId, last4).then(function(res){
      if(!res.ok){ msg.textContent=res.msg||'조회 실패'; return; }
      // 서버모드면 scope 데이터 로드 후 렌더(약간 지연), 로컬은 즉시
      if(SUB.serverOn()) setTimeout(function(){ render(res.cid, appId); }, 600);
      else render(res.cid, appId);
    });
  }

  function render(cid, appId){
    var ap=(SUB.DB.applicants||{})[cid]||{};
    var co=null; (SUB.DB.companies||[]).forEach(function(c){ if(c.cid===cid) co=c; });
    var stage=(co&&co.stage)||'신청';
    document.getElementById('loginCard').style.display='none';
    var sc=document.getElementById('statusCard'); sc.style.display='block';
    document.getElementById('coName').textContent=ap.org||ap.ceo||'신청 건';
    document.getElementById('rId').textContent=ap.appId||appId;
    var si=STAGES.indexOf(stage);
    document.getElementById('steps').innerHTML=STAGES.map(function(s,i){ return '<div class="step'+(i<=si?' on':'')+'">'+s+'</div>'; }).join('');
    document.getElementById('info').innerHTML=
      '<tr><td>현재 단계</td><td><span class="stage">'+esc(stage)+'</span></td></tr>'+
      '<tr><td>대표자</td><td>'+esc(ap.ceo||'-')+'</td></tr>'+
      '<tr><td>대상기술</td><td>'+esc(ap.techName||'-')+'</td></tr>'+
      '<tr><td>적격성 자가진단</td><td>'+esc(ap.eligibility||'-')+'</td></tr>'+
      (ap.express?'<tr><td>Express</td><td>⚡ 후보 — 담당자 서류확인 후 진행</td></tr>':'');
    var ex=document.getElementById('extra'), html='';
    if(co&&co.meetingRequested){ html+='<div style="padding:10px 12px;background:#fbf5f7;border:1px solid #f0e0e6;border-radius:9px;font-size:13px">📅 담당자가 <b>사전 미팅</b>을 요청했습니다. <a class="link" href="'+SUB.MEETING_URL+'" target="_blank">미팅 예약하기 →</a></div>'; }
    if(ap.locked===false){
      html+='<div style="margin-top:10px;padding:12px;background:#eef7f0;border:1px solid #bfe3cb;border-radius:9px">'+
        '<b style="color:#1f8a4c">✏️ 수정 허용됨</b> <span style="font-size:12px;color:#666">— 아래 항목을 수정 후 제출하면 직전 내용이 이력으로 보존되고 다시 잠깁니다(1회).</span>'+
        '<label>기업명</label><input id="e_org" value="'+SUB.esc(ap.org||'')+'">'+
        '<label>연락처</label><input id="e_tel" value="'+SUB.esc(ap.tel||'')+'">'+
        '<label>이메일</label><input id="e_email" value="'+SUB.esc(ap.email||'')+'">'+
        '<label>대상기술</label><input id="e_tech" value="'+SUB.esc(ap.techName||'')+'">'+
        '<label>분야</label><input id="e_field" value="'+SUB.esc(ap.field||'')+'">'+
        '<button onclick="submitEdit(\''+cid+'\')">수정 제출</button><div class="msg" id="editMsg"></div></div>';
    } else {
      html+='<div style="color:#888;font-size:12px;margin-top:8px">※ 제출 내용은 잠금 상태입니다. 수정이 필요하면 담당자에게 요청하세요(관리자 허용 시 수정 가능).</div>';
    }
    ex.innerHTML=html;
  }
  function submitEdit(cid){
    var g=function(id){ return document.getElementById(id).value.trim(); };
    var edits={ org:g('e_org'), tel:g('e_tel'), email:g('e_email'), techName:g('e_tech'), field:g('e_field') };
    document.getElementById('editMsg').textContent='제출 중…';
    SUB.reapplyEdit(cid, edits).then(function(res){
      if(res&&res.ok){ document.getElementById('editMsg').textContent='수정 제출 완료 ✔ (다시 잠김)'; setTimeout(function(){ render(cid, document.getElementById('rId').textContent); }, 600); }
      else document.getElementById('editMsg').textContent='수정 실패: '+((res&&res.error)||'');
    });
  }
  // URL ?appId= 자동 채움
  (function(){ var m=(location.search||'').match(/[?&]appId=([^&]*)/); if(m) document.getElementById('appId').value=decodeURIComponent(m[1]); })();
</script>
</body>
</html>
